# =====================
# APPLICATION ARGOCD — SECRETS LOCAUX (SealedSecrets)
# Gère le dossier secrets/ contenant les SealedSecrets du cluster local.
# Un SealedSecret est chiffré avec la clé publique du controller :
# committable dans Git, seul le cluster peut le déchiffrer.
# =====================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://gitlab.com/SNsitso/webservice-devops-cloud.git
    targetRevision: main
    path: appli/gitops/local/secrets
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: wordpress

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 5
      backoff:
        duration: 30s
