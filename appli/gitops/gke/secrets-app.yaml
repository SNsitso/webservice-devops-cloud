# =====================
# APPLICATION ARGOCD — SECRETS GKE
# Gère le dossier secrets/ (ClusterSecretStore + ExternalSecrets)
# en GitOps, comme le reste. Sync automatique : une référence de secret
# n'est pas sensible, elle peut être réconciliée sans validation.
#
# Ordre : synchroniser wordpress-staging et wordpress-prod AVANT
# cette Application (les namespaces staging/wordpress doivent exister).
# =====================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gke-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://gitlab.com/SNsitso/webservice-devops-cloud.git
    targetRevision: main
    path: appli/gitops/gke/secrets
    directory:
      recurse: false

  destination:
    server: https://kubernetes.default.svc
    namespace: default # sans effet : chaque manifest porte son propre namespace

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 5
      backoff:
        duration: 30s
