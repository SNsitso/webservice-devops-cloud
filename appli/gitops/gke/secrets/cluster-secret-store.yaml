# =====================
# CLUSTER SECRET STORE — GCP SECRET MANAGER
# Déclare "où" External Secrets Operator va chercher les secrets.
# Cluster-scoped : utilisable depuis tous les namespaces (staging, wordpress).
#
# Authentification : Workload Identity — le ServiceAccount K8s d'ESO
# est lié à un Service Account GCP ayant le rôle
# roles/secretmanager.secretAccessor (config faite à l'installation d'ESO).
# Aucune clé statique, même principe que l'OIDC du pipeline.
# =====================
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: webservice-devops
