# =====================
# EXTERNAL SECRET — STAGING
# Ceci N'EST PAS un secret : c'est une RÉFÉRENCE committable dans Git.
# ESO lit "wordpress-db-password" dans GCP Secret Manager et crée/maintient
# le Secret K8s "wordpress-db" dans le namespace staging.
# Le pod WordPress le consomme ensuite via secretKeyRef.
# =====================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wordpress-db
  namespace: staging
spec:
  refreshInterval: 1h # re-synchronisation périodique (rotation de secret possible)
  secretStoreRef:
    kind: ClusterSecretStore
    name: gcp-secret-manager
  target:
    name: wordpress-db # nom du Secret K8s créé
    creationPolicy: Owner
  data:
    - secretKey: password # clé dans le Secret K8s
      remoteRef:
        key: wordpress-db-password # nom du secret dans GCP Secret Manager
    - secretKey: wp-admin-password # compte admin WordPress (image Bitnami)
      remoteRef:
        key: wordpress-admin-password
