apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "wordpress.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.wordpress.deployment.replicaCount }}
  # Recreate : sur un cluster aux ressources serrées, le RollingUpdate par
  # défaut s'interbloque (le nouveau pod ne peut pas se placer tant que
  # l'ancien occupe les ressources). Brève interruption acceptée.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wordpress.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      # Pré-remplit les emptyDir avec les fichiers de l'image (pattern du
      # chart Bitnami officiel) : sans ça, le montage sur /opt/bitnami/wordpress
      # masque l'application (wp-config.php introuvable au démarrage)
      initContainers:
      - name: prepare-base-dir
        image: {{ .Values.wordpress.deployment.image }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL
        command:
        - /bin/bash
        - -ec
        - |
          cp -r --preserve=mode /opt/bitnami/wordpress /emptydir/app-base-dir
          cp -r --preserve=mode /opt/bitnami/apache/logs /emptydir/apache-logs-dir
          cp -r --preserve=mode /opt/bitnami/php/etc /emptydir/php-conf-dir
          cp -r --preserve=mode /opt/bitnami/php/var /emptydir/php-var-dir
        volumeMounts:
        - name: empty-dir
          mountPath: /emptydir
      containers:
      - name: wordpress
        image: {{ .Values.wordpress.deployment.image }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        env:
        - name: WORDPRESS_DATABASE_HOST
          value: {{ if .Values.cloudsql.enabled }}"{{ .Values.cloudsql.host }}"{{ else }}{{ template "mysql.fullname" . }}{{ end }}
        - name: WORDPRESS_DATABASE_PORT_NUMBER
          value: {{ if .Values.cloudsql.enabled }}"{{ .Values.cloudsql.port }}"{{ else }}"3306"{{ end }}
        - name: WORDPRESS_DATABASE_NAME
          value: {{ if .Values.cloudsql.enabled }}"{{ .Values.cloudsql.database }}"{{ else }}"wordpress"{{ end }}
        - name: WORDPRESS_DATABASE_USER
          value: {{ if .Values.cloudsql.enabled }}"{{ .Values.cloudsql.username }}"{{ else }}"wordpress"{{ end }}
        - name: WORDPRESS_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              {{- if .Values.cloudsql.enabled }}
              # Secret créé par External Secrets Operator (GCP Secret Manager)
              name: {{ .Values.cloudsql.existingSecret }}
              key: password
              {{- else }}
              # Secret local du chart (remplacé par un SealedSecret à terme)
              name: {{ template "mysql.secrets" . }}
              key: db-password
              {{- end }}
        - name: WORDPRESS_TABLE_PREFIX
          value: {{ .Values.env.WORDPRESS_TABLE_PREFIX | default "wp_" }}
        # Compte admin WordPress (exigé par l'image Bitnami)
        - name: WORDPRESS_USERNAME
          value: {{ .Values.wordpress.username | default "admin" | quote }}
        - name: WORDPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              {{- if .Values.cloudsql.enabled }}
              name: {{ .Values.cloudsql.existingSecret }}
              {{- else }}
              name: {{ template "mysql.secrets" . }}
              {{- end }}
              key: wp-admin-password
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: wordpress-data
          mountPath: /bitnami/wordpress
        # Pattern du chart Bitnami officiel : un seul emptyDir découpé en
        # subPaths pour rendre readOnlyRootFilesystem viable. L'entrypoint
        # recopie l'application dans app-base-dir au démarrage.
        - name: empty-dir
          mountPath: /tmp
          subPath: tmp-dir
        - name: empty-dir
          mountPath: /opt/bitnami/apache/conf
          subPath: apache-conf-dir
        - name: empty-dir
          mountPath: /opt/bitnami/apache/logs
          subPath: apache-logs-dir
        - name: empty-dir
          mountPath: /opt/bitnami/apache/var/run
          subPath: apache-tmp-dir
        - name: empty-dir
          mountPath: /opt/bitnami/php/etc
          subPath: php-conf-dir
        - name: empty-dir
          mountPath: /opt/bitnami/php/tmp
          subPath: php-tmp-dir
        - name: empty-dir
          mountPath: /opt/bitnami/php/var
          subPath: php-var-dir
        - name: empty-dir
          mountPath: /opt/bitnami/wordpress
          subPath: app-base-dir
        {{- if .Values.cloudsql.enabled }}
        # Voir templates/mysql-client-config.yaml (TLS Cloud SQL)
        - name: mysql-client-config
          mountPath: /etc/my.cnf
          subPath: my.cnf
        {{- end }}
      volumes:
      - name: wordpress-data
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ template "wordpress.fullname" . }}-data
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: empty-dir
        emptyDir: {}
      {{- if .Values.cloudsql.enabled }}
      - name: mysql-client-config
        configMap:
          name: {{ template "wordpress.fullname" . }}-mysql-client
      {{- end }}
