wordpress:
    deployment:
        # Image Bitnami (même digest que GKE — parité dev/prod) :
        # le securityContext du template (runAsUser 1001, port 8080)
        # est spécifique aux images Bitnami. wordpress:4.8-apache
        # (root, port 80) crashait avec ces contraintes.
        image: bitnami/wordpress@sha256:39d337946920c27adea7b0495692ab7c11734a2bd32564edb5a415d5ecf137bd
        replicaCount: 1
    service:
        type: ClusterIP
        port: 80
    
mysql:
    # Requis : tous les templates mysql-* sont gardés par cette clé
    enabled: true
    # false = le Secret vient d'un SealedSecret géré en GitOps
    # (l'Application ArgoCD locale le positionne à false)
    createSecret: true
    deployment:
        image: mysql:5.6
        replicaCount: 1
    service:
        type: ClusterIP
        port: 3306
    pvc:
        accessMode: ReadWriteOnce
        storage: 2Gi
        storageClassName: local-path

ingress:
  enabled: true
  className: nginx
  # host sera remplacé dynamiquement depuis CI
  host: ""
  path: /
  tls:
    enabled: false  # mettre true si cert-manager configuré
    secretName: wordpress-tls

# Défauts requis par les templates (surchargés par values-gke.yaml sur GKE)
image:
  pullPolicy: IfNotPresent

env:
  WORDPRESS_TABLE_PREFIX: wp_

cloudsql:
  enabled: false

persistence:
  enabled: false
