# 1 réplique : le PVC (disque GCP) est en ReadWriteOnce — un seul nœud
# peut le monter. Passer à 2+ exigerait un stockage ReadWriteMany (Filestore).
replicaCount: 1

image:
  repository: bitnami/wordpress
  tag: latest
  pullPolicy: IfNotPresent

wordpress:
  username: admin
  email: admin@example.com
  title: My WordPress Site
  deployment:
    # Épinglé par digest : depuis 2025-08 Bitnami ne publie plus de tags
    # versionnés gratuits (seul :latest reste). Le digest garantit un
    # déploiement reproductible. Mise à jour volontaire :
    #   docker buildx imagetools inspect bitnami/wordpress:latest
    image: bitnami/wordpress@sha256:39d337946920c27adea7b0495692ab7c11734a2bd32564edb5a415d5ecf137bd
    replicaCount: 1
  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080
  annotations: {}

mysql:
  enabled: false

cloudsql:
  enabled: true
  host: 10.39.128.3
  port: 3306
  database: wordpress
  username: wordpress
  # Secret K8s créé par External Secrets Operator (voir gitops/gke/secrets/)
  # Le mot de passe n'apparaît plus nulle part dans Git ni dans le CI
  existingSecret: wordpress-db

persistence:
  enabled: true
  storageClass: standard
  size: 10Gi
  mountPath: /bitnami/wordpress

env:
  WORDPRESS_TABLE_PREFIX: wp_

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  # Requests réduites : les nœuds e2-small (940m/1.3Gi allouables) hébergent
  # aussi ArgoCD + ESO + système GKE. Requests = réservation du scheduler,
  # pas la conso réelle — les limits laissent de la marge d'usage.
  requests:
    cpu: 100m
    memory: 192Mi

affinity: {}
tolerations: []
nodeSelector: {}
