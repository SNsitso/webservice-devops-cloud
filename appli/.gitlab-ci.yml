stages:
- test
- security_test
- release

# =====================
# CI DE VALIDATION UNIQUEMENT — les déploiements sont assurés par ArgoCD
# (GitOps pull) : voir appli/gitops/. Ce pipeline n'a AUCUN accès aux
# clusters ni à GCP — il valide et package le chart à chaque push.
# =====================
variables:
  # Monorepo : les jobs s'exécutent à la racine du dépôt
  CHART_PATH: appli/wordpress

image:
  name: alpine/helm:3.16.1
  entrypoint: [ "" ]

# =====================
# TEMPLATE — TRIVY (jobs security)
# =====================
.trivy:
  before_script:
  - apk add --no-cache curl
  - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
  - install -m 0755 ./bin/trivy /usr/local/bin/trivy
  - trivy --version

# =====================
# TEST HELM — lint + rendu des deux modes (local et GKE)
# =====================
test:
  stage: test
  script:
  - helm lint $CHART_PATH -f $CHART_PATH/values.yaml -f $CHART_PATH/values-gke.yaml
  - helm template test-release $CHART_PATH -f $CHART_PATH/values.yaml -f $CHART_PATH/values-gke.yaml --dry-run
  - helm lint $CHART_PATH -f $CHART_PATH/values.yaml
  - helm template test-local $CHART_PATH -f $CHART_PATH/values.yaml --dry-run
  - echo "Helm lint et dry-run OK (modes GKE et local)"
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'

# =====================
# SECURITY TEST - TRIVY IMAGES
# Bloquant : seules les CVE CRITICAL avec correctif bloquent
# =====================
trivy_images_scan:
  stage: security_test
  extends: .trivy
  script:
  - helm template trivy-scan $CHART_PATH -f $CHART_PATH/values.yaml -f $CHART_PATH/values-gke.yaml > rendered.yaml
  - |
    echo "Extraction des images Docker..."
    IMAGES=$(grep -oE 'image:\s*[^ ]+' rendered.yaml | awk '{print $2}' | sort -u)
    echo "Images détectées :"
    echo "$IMAGES"
  - |
    for IMAGE in $IMAGES; do
      echo "Scan de l'image : $IMAGE"
      trivy image \
        --severity CRITICAL \
        --ignore-unfixed \
        --exit-code 1 \
        --no-progress \
        $IMAGE
    done
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'

# =====================
# SECURITY TEST - TRIVY CONFIG
# Bloquant : scan des manifests K8s rendus
# =====================
trivy_config_scan:
  stage: security_test
  extends: .trivy
  script:
  - helm template trivy-scan $CHART_PATH -f $CHART_PATH/values.yaml -f $CHART_PATH/values-gke.yaml > rendered.yaml
  - trivy config rendered.yaml --severity HIGH,CRITICAL --exit-code 1 --quiet
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'

# =====================
# SECURITY TEST - TRIVY SECRETS
# Bloquant : scan du dépôt pour secrets commis par erreur
# =====================
trivy_secret_scan:
  stage: security_test
  extends: .trivy
  script:
  - trivy fs . --scanners secret --exit-code 1 --no-progress
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'

# =====================
# RELEASE - PACKAGE HELM
# =====================
release:
  stage: release
  script:
  - helm package $CHART_PATH
  - echo "Chart packagé avec succès"
  artifacts:
    paths:
    - "*.tgz"
    expire_in: 1 week
  rules:
  - if: '$CI_COMMIT_BRANCH == "main"'
