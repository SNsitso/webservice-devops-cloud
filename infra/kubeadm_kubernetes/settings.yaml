---
cluster_name: Kubernetes Cluster
network:
  velero-backup: 10.0.0.8
  runner_ip: 10.0.0.9
  control_ip: 10.0.0.10
  dns_servers:
    - 8.8.8.8
    - 1.1.1.1
  pod_cidr: 172.16.1.0/16
  service_cidr: 172.17.1.0/18
nodes:
  control:
    cpu: 2
    memory: 2048
  workers:
    count: 2
    cpu: 2
    # 3 Go au lieu de 4 : suffisant pour ArgoCD + WordPress + MySQL,
    # et évite la sursouscription RAM de l'hôte (16 Go)
    memory: 3072
software:
  box: bento/ubuntu-24.04
  calico: 3.26.0

  dashboard: 2.7.0
  kubernetes: 1.31.0-*

  os: xUbuntu_24.04
